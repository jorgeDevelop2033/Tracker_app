services:
  tracker-web:
    image: ghcr.io/jorgedevelop2033/tracker-web:latest
    container_name: tracker-web
    restart: unless-stopped
    ports:
      - "8090:80"            # provisional por IP (dashboard)
    mem_limit: 128m
    mem_reservation: 32m
    cpus: 0.25
    networks:
      - devsogu-net

networks:
  devsogu-net:
    external: true
